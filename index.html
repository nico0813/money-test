<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026 钱味觉醒测试</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#0f172a;color:#fff;padding:20px}
.container{max-width:600px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:16px;margin-top:20px}
button{padding:12px;border:none;border-radius:12px;background:#7c3aed;color:white;font-weight:bold;cursor:pointer;margin-top:10px}
input{padding:12px;border-radius:12px;border:none;width:100%;margin-top:10px}
.option{background:#334155;padding:12px;border-radius:12px;margin-top:10px;cursor:pointer}
.option:hover{background:#475569}
.hidden{display:none}
.result{font-size:20px;font-weight:bold;margin-top:20px}
.small{font-size:14px;color:#94a3b8}
</style>
</head>

<body>
<div class="container">
<h2>2026 钱味觉醒测试</h2>
<p class="small">输入神秘口令进入测试</p>

<input id="code" placeholder="输入神秘口令">
<button onclick="unlock()">进入测试</button>

<div id="quiz" class="hidden card"></div>
<div id="resultBox" class="hidden card">
<div id="resultText" class="result"></div>
<p id="resultDesc"></p>
</div>
</div>

<script>
const TODAY_CODE="WAKEN2026";

const questions=[
{q:"你更舒服的赚钱方式？",options:{A:"稳稳积累",B:"抓爆发机会",C:"提升技能赚钱",D:"靠合作放大"}},
{q:"面对风险你更像？",options:{A:"保守优先",B:"敢冲",C:"分析优化",D:"找人一起"}}
];

const types={
A:{name:"稳健累积型",desc:"适合长期积累，关键词：纪律、复利"},
B:{name:"进攻成长型",desc:"适合窗口爆发，关键词：节奏、风口"},
C:{name:"认知套利型",desc:"适合技能升级，关键词：单价、专业"},
D:{name:"资源整合型",desc:"适合合作放大，关键词：杠杆、连接"}
};

let answers=[];

function unlock(){
const input=document.getElementById("code").value.trim();
if(input!==TODAY_CODE){alert("口令错误");return;}
startQuiz();
}

function startQuiz(){
document.getElementById("quiz").classList.remove("hidden");
renderQuestion(0);
}

function renderQuestion(index){
if(index>=questions.length){showResult();return;}
const quiz=document.getElementById("quiz");
quiz.innerHTML="<h3>"+questions[index].q+"</h3>";
for(let key in questions[index].options){
const div=document.createElement("div");
div.className="option";
div.innerText=key+"："+questions[index].options[key];
div.onclick=function(){answers.push(key);renderQuestion(index+1);};
quiz.appendChild(div);
}
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("resultBox").classList.remove("hidden");
const score={A:0,B:0,C:0,D:0};
answers.forEach(a=>score[a]++);
let maxType="A";
for(let key in score){if(score[key]>score[maxType]){maxType=key;}}
document.getElementById("resultText").innerText="你的钱味体质："+types[maxType].name;
document.getElementById("resultDesc").innerText=types[maxType].desc;
}
</script>

</body>
</html>
