<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>2026 钱味觉醒测试｜完整版</title>
  <style>
    :root{
      --bg:#050612;
      --tx:#edf1ff;
      --sub:#a5aecb;
      --bd:rgba(255,255,255,.16);
      --glass:rgba(10,13,30,.86);
      --glass2:rgba(13,18,40,.96);
      --shadow:0 18px 60px rgba(0,0,0,.55);
      --accent:#ff3d8d;
      --accent2:#7c3aed;
      --accent3:#22c55e;
      --max:960px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--tx);
      background:
        radial-gradient(900px 600px at 10% 5%, rgba(255,61,141,.26), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(124,58,237,.28), transparent 60%),
        radial-gradient(900px 600px at 60% 90%, rgba(34,197,94,.22), transparent 60%),
        #020314;
      padding:16px 12px 48px;
    }
    .wrap{max-width:var(--max);margin:0 auto}
    .hidden{display:none !important}

    .hero{
      border:1px solid var(--bd);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(11,16,40,.95));
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .space{justify-content:space-between}
    h1{margin:0 0 6px;font-size:18px;letter-spacing:.2px}
    .sub{margin:0;color:var(--sub);font-size:13px;line-height:1.7}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 12px;border-radius:999px;
      border:1px solid var(--bd);
      background:rgba(255,255,255,.04);
      font-size:12px;color:var(--sub);
    }

    .card{
      margin-top:12px;
      border:1px solid var(--bd);
      background:linear-gradient(180deg, var(--glass2), var(--glass));
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    input{
      width:min(420px,100%);
      border:1px solid rgba(255,255,255,.2);
      background:rgba(6,9,26,.9);
      color:var(--tx);
      border-radius:16px;
      padding:11px 12px;
      font-size:14px;
      outline:none;
    }
    input::placeholder{color:#8f9abd}

    button{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--tx);
      border-radius:16px;
      padding:11px 14px;
      font-weight:900;
      cursor:pointer;
      font-size:14px;
    }
    button.primary{
      border-color:transparent;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
    }
    button:disabled{opacity:.5;cursor:not-allowed}

    .progressWrap{margin-top:10px}
    .bar{
      height:10px;border-radius:999px;background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);overflow:hidden;
    }
    .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent3),#60a5fa,var(--accent))}
    .ptext{margin-top:8px;color:var(--sub);font-size:12px}

    .mini{color:var(--sub);font-size:12px;line-height:1.6}
    .divider{height:1px;background:rgba(255,255,255,.12);margin:12px 0}

    /* 问题 */
    .qtitle{margin:0 0 10px;font-size:15px;font-weight:900;line-height:1.45}
    .qindex{color:#f9fafb;font-size:12px;font-weight:700;margin-bottom:4px;opacity:.9}
    .opts{display:grid;gap:10px}
    label.opt{
      display:block;cursor:pointer;
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(34,40,80,.95), rgba(12,15,40,.96));
      border-radius:18px;
      padding:10px;
      transition:transform .08s ease,border-color .12s ease,box-shadow .12s ease;
    }
    label.opt:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.3);
      box-shadow:0 10px 25px rgba(0,0,0,.45);
    }
    .inner{display:flex;gap:10px;align-items:flex-start}
    .k{
      display:inline-flex;align-items:center;justify-content:center;
      width:28px;height:28px;border-radius:11px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.2);
      font-weight:900;flex:0 0 auto;
    }
    .otxt{line-height:1.5;font-size:14px}
    input[type="radio"]{display:none}
    input[type="radio"]:checked + .inner{
      outline:2px solid rgba(255,61,141,.7);
      border-radius:12px;padding:6px;
    }

    /* 结果 */
    .resultCard{
      padding:14px;border-radius:22px;
      background:
        linear-gradient(135deg, rgba(255,61,141,.2), rgba(124,58,237,.26)),
        radial-gradient(800px 520px at 15% 15%, rgba(34,197,94,.18), transparent 60%),
        #050617;
      border:1px solid rgba(255,255,255,.18);
    }
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.22);
      font-size:12px;font-weight:900;
    }
    .big{font-size:22px;font-weight:1100;margin:8px 0 6px}
    .one{font-weight:900;line-height:1.6}

    .tagline{margin:4px 0 0;font-size:13px;color:#f9fafb;opacity:.9}
    .pillRow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .softPill{
      padding:5px 9px;border-radius:999px;
      background:rgba(15,23,42,.7);
      border:1px solid rgba(148,163,184,.45);
      font-size:11px;color:#cbd5f5;
    }

    .grid{
      display:grid;
      grid-template-columns: minmax(0,1.1fr) minmax(0,.9fr);
      gap:12px;
      align-items:stretch;
    }
    @media(max-width:720px){
      .grid{grid-template-columns:1fr}
    }
    .box{
      border-radius:18px;
      background:rgba(9,12,30,.95);
      border:1px solid rgba(148,163,184,.4);
      padding:12px;
    }
    .h3{margin:0 0 8px;font-size:13px;font-weight:900;color:#e5e7ff}
    .list{font-size:13px;line-height:1.75;color:#dde3ff}
    .share{
      white-space:pre-wrap;
      background:rgba(3,7,18,.9);
      border:1px solid rgba(148,163,184,.5);
      padding:11px;border-radius:16px;
      font-size:13px;line-height:1.55;color:#e5e7ff;
    }

    .toast{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
      background:#020617;border:1px solid rgba(148,163,184,.6);color:#e5e7eb;
      padding:8px 12px;border-radius:14px;font-size:13px;
      opacity:0;pointer-events:none;transition:.18s;
    }
    .toast.show{opacity:1}
  </style>
</head>

<body>
<div class="wrap">

      <div>

  <section class="card hidden" id="result">

    <div class="divider"></div>

    <div class="grid">

          <button class="primary" id="again">再测一次</button>
        </div>
      </div>
    </div>

    <p class="mini" style="margin-top:10px">
      免责声明：仅作个人倾向分析，不构成投资 / 理财建议，不保证任何收益结果。
    </p>
  </section>

</div>

        "很多事情不是你最专业，但你最适合当总控。"
      ],
      trap:"一开始大家一起嗨，后面变成你在收尾；不提前写清楚规则，后面很难不好受。",
      fit:[
        "项目类副业：合伙、分销、渠道、联名",
        "运营 / PM / 社群主理人 / BD",
        "任何可以被流程化的协作生意"
      ],
      todoYear:"2026 你的关键词是：<b>规则 + 模型</b>。别再只靠自己“扛”，把合作方式变成可以复制的玩法。",
      today:"今天就做一件小事：回想你最近一次合作，写一段话，列清楚【谁负责什么】【最终产出是什么】【钱怎么分】，以后每次合作都用这段话当模板。"
    }
  };

  const $ = id => document.getElementById(id);
  const gate = $("gate");
  const quiz = $("quiz");
  const result = $("result");
  const fill = $("fill");
  const ptext = $("ptext");
  const toast = $("toast");

  let idx = 0;
  const answers = Array(QUESTIONS.length).fill(null);

  function toastShow(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"), 900);
  }

  function showOnly(which){
    gate.classList.add("hidden");
    quiz.classList.add("hidden");
    result.classList.add("hidden");
    if(which==="gate") gate.classList.remove("hidden");
    if(which==="quiz") quiz.classList.remove("hidden");
    if(which==="result") result.classList.remove("hidden");
  }

  function updateProgress(){
    const done = answers.filter(x=>x!==null).length;
    ptext.textContent = `进度：${done} / ${QUESTIONS.length}`;
    fill.style.width = `${Math.round(done/QUESTIONS.length*100)}%`;
  }

  function renderQuestion(){
    const q = QUESTIONS[idx];
    quiz.innerHTML = `
      <div>
        <div class="qindex">第 ${idx+1} 题 / ${QUESTIONS.length}</div>
        <p class="qtitle">${q.t}</p>
        <div class="opts">
          ${Object.entries(q.o).map(([k,v])=>`
            <label class="opt">
              <input type="radio" name="q${idx}" value="${k}">
              <div class="inner">
                <div class="k">${k}</div>
                <div class="otxt">${v}</div>
              </div>
            </label>
          `).join("")}
        </div>
        <p class="mini" style="margin-top:10px">别想太多，选你第一反应就好。</p>
      </div>
    `;

    quiz.querySelectorAll(`input[name="q${idx}"]`).forEach(r=>{
      r.addEventListener("change", e=>{
        answers[idx] = e.target.value;
        updateProgress();
        // 选完自动跳下一题 / 出结果
        if(idx === QUESTIONS.length - 1){
          showResult();
        }else{
          idx++;
          renderQuestion();
          window.scrollTo({top:0,behavior:"smooth"});
        }
      });
    });
  }

  function computeType(){
    const score = {A:0,B:0,C:0,D:0};
    answers.forEach(a=>score[a]++);
    const priority = {C:4,D:3,A:2,B:1};
    const sorted = Object.entries(score).sort((x,y)=>{
      if(y[1]!==x[1]) return y[1]-x[1];
      return priority[y[0]]-priority[x[0]];
    });
    return {type: sorted[0][0], score};
  }

  function showResult(){
    const {type, score} = computeType();
    const t = TYPE[type];
    const scoreLine = `A:${score.A}  B:${score.B}  C:${score.C}  D:${score.D}`;

    $("resultCard").innerHTML = `
      <div class="badge">
        <span>类型 ${t.code}</span>
        <span>·</span>
        <span>${t.name}</span>
      </div>
      <div class="big">${t.name}</div>
      <div class="one">${t.line}</div>
      <p class="tagline">一句话总结：${t.todoYear.replace(/<[^>]+>/g,"")}</p>
      <div class="pillRow">
        ${t.tags.map(x=>`<span class="softPill">${x}</span>`).join("")}
      </div>
      <div class="mini" style="margin-top:8px">得分：${scoreLine}（建议截图保存这张卡）</div>
    `;

    $("report").innerHTML = `
      <p><b>你现实里的典型样子：</b></p>
      <p>• ${t.lookLike.join("<br>• ")}</p>
      <p style="margin-top:8px"><b>你容易翻车的点：</b><br>${t.trap}</p>
      <p style="margin-top:8px"><b>你更适合走的路子：</b><br>• ${t.fit.join("<br>• ")}</p>
      <p style="margin-top:8px">${t.todoYear}</p>
    `;

    $("task").innerHTML = `• ${t.today}`;

    $("share").textContent = [
      `我刚做了一个「2026 钱味觉醒测试」`,
      `测出来我是：${t.name}`,
      `他们给我的评价是：${t.line}`,
      `得分：${scoreLine}`,
      `2026 主线任务：${t.todoYear.replace(/<[^>]+>/g,"")}`,
      `#钱味觉醒测试 #2026搞钱体质`
    ].join("\n");

    showOnly("result");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  // 事件
  $("unlock").addEventListener("click", ()=>{
    const v = ($("code").value || "").trim();
    if(v !== TODAY_CODE){
      alert("口令不对。回小红书订单自动回复里确认一下。");
      return;
    }
    idx = 0;
    answers.fill(null);
    showOnly("quiz");
    renderQuestion();
  });

  $("help").addEventListener("click", ()=>{
    $("helpText").classList.toggle("hidden");
  });

  $("again").addEventListener("click", ()=>{
    $("code").value = "";
    answers.fill(null);
    idx = 0;
    updateProgress();
    showOnly("gate");
    window.scrollTo({top:0,behavior:"smooth"});
  });

  $("copy").addEventListener("click", async ()=>{
    try{
      await navigator.clipboard.writeText($("share").textContent);
      toastShow("已复制 ✅");
    }catch(e){
      alert("复制失败：可以手动长按选择复制。");
    }
  });

  updateProgress();
</script>
</body>
</html>
