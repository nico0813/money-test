<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>2026 钱味觉醒测试｜完整版</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+XiaoWei&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.0/dist/dom-to-image-more.min.js"></script>

<style>
:root {
  --bg: #04050f;
  --tx: #f0eeff;
  --sub: #8b8fad;
  --bd: rgba(255,255,255,.1);
  --accent: #ff2d7a;
  --accent2: #6c1fff;
  --accent3: #00e5b0;
  --gold: #ffd166;
  --max: 680px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
  color: var(--tx);
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
}

/* ── 自定义光标 ── */
#cursor {
  position: fixed; top: 0; left: 0; z-index: 99999;
  width: 20px; height: 20px;
  border: 2px solid var(--accent);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%,-50%);
  transition: width .2s, height .2s, border-color .2s, background .15s;
  mix-blend-mode: screen;
}
#cursorDot {
  position: fixed; top: 0; left: 0; z-index: 99999;
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%,-50%);
}
body:has(label.opt:hover) #cursor {
  width: 40px; height: 40px;
  border-color: var(--accent3);
  background: rgba(0,229,176,.08);
}

/* ── 粒子画布 ── */
#bgCanvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── 噪点纹理 ── */
body::before {
  content: "";
  position: fixed; inset: 0; z-index: 1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: .5;
}

.wrap {
  position: relative; z-index: 2;
  max-width: var(--max);
  margin: 0 auto;
  padding: 20px 16px 80px;
}

.hidden { display: none !important; }

/* ── 入场动画 ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes glitch {
  0%,100%  { clip-path: inset(0 0 98% 0); transform: translate(-4px,0); }
  20%      { clip-path: inset(40% 0 50% 0); transform: translate(4px,0); }
  40%      { clip-path: inset(70% 0 20% 0); transform: translate(-4px,0); }
  60%      { clip-path: inset(20% 0 70% 0); transform: translate(4px,0); }
  80%      { clip-path: inset(80% 0 10% 0); transform: translate(-2px,0); }
}
@keyframes pulse-ring {
  0%   { transform: scale(1); opacity: .6; }
  100% { transform: scale(2.2); opacity: 0; }
}
@keyframes scanline {
  0%   { background-position: 0 0; }
  100% { background-position: 0 100px; }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes neonFlicker {
  0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
  20%,22%,24%,55% { opacity: .4; }
}
@keyframes resultIn {
  0%   { opacity: 0; transform: scale(.88) translateY(30px); filter: blur(12px); }
  60%  { filter: blur(0); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes tagPop {
  0%   { opacity: 0; transform: scale(0) rotate(-12deg); }
  70%  { transform: scale(1.15) rotate(3deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
@keyframes borderSpin {
  to { --angle: 360deg; }
}
@keyframes floatBob {
  0%,100% { transform: translateY(0px); }
  50%     { transform: translateY(-8px); }
}

/* ── 英雄区 ── */
.hero {
  animation: fadeUp .7s ease both;
  margin-bottom: 20px;
}

.heroInner {
  position: relative;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 28px;
  padding: 28px 24px 24px;
  background: linear-gradient(160deg, rgba(255,45,122,.1) 0%, rgba(108,31,255,.12) 50%, rgba(0,229,176,.08) 100%);
  overflow: hidden;
}
.heroInner::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
  border-radius: inherit;
  pointer-events: none;
}
.heroInner::after {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
  animation: scanline 8s linear infinite;
  pointer-events: none;
  border-radius: inherit;
  opacity: .5;
}

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 999px;
  border: 1px solid rgba(255,209,102,.4);
  background: rgba(255,209,102,.08);
  color: var(--gold);
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  margin-bottom: 14px;
  font-family: 'Bebas Neue', sans-serif;
  animation: fadeUp .6s .1s ease both;
}
.badge::before {
  content: "◆"; font-size: 8px;
  animation: neonFlicker 3s 2s infinite;
}

.heroTitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(32px, 8vw, 52px);
  line-height: 1;
  letter-spacing: 2px;
  position: relative;
  margin-bottom: 4px;
  animation: fadeUp .6s .15s ease both;
}
.heroTitle span {
  background: linear-gradient(90deg, #fff 0%, var(--gold) 40%, var(--accent) 70%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.heroTitle::after {
  content: attr(data-text);
  position: absolute; top: 0; left: 0;
  background: linear-gradient(90deg, #fff 0%, var(--gold) 40%, var(--accent) 70%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: glitch 6s 2s infinite;
  opacity: .7;
}

.heroSub {
  color: var(--sub);
  font-size: 13px; line-height: 1.9;
  font-family: 'Noto Serif SC', serif;
  animation: fadeUp .6s .2s ease both;
  margin-bottom: 20px;
}

.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 999px;
  border: 1px solid rgba(0,229,176,.3);
  background: rgba(0,229,176,.06);
  color: var(--accent3);
  font-size: 11px; letter-spacing: .5px;
  margin-bottom: 20px;
  animation: fadeUp .6s .25s ease both;
}

/* ── 口令输入 ── */
.inputRow {
  display: flex; gap: 10px; flex-wrap: wrap;
  animation: fadeUp .6s .3s ease both;
}
.codeInput {
  flex: 1; min-width: 200px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 14px;
  padding: 12px 16px;
  color: var(--tx);
  font-size: 14px;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.codeInput::placeholder { color: rgba(255,255,255,.25); letter-spacing: 1px; font-size: 12px; font-family: 'Noto Serif SC', serif; }
.codeInput:focus {
  border-color: rgba(255,45,122,.6);
  box-shadow: 0 0 0 3px rgba(255,45,122,.12), 0 0 20px rgba(255,45,122,.15);
}

.btnPrimary {
  padding: 12px 20px;
  border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 14px; font-weight: 700;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1.5px;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: transform .15s, box-shadow .2s;
  box-shadow: 0 8px 28px rgba(255,45,122,.35);
  white-space: nowrap;
}
.btnPrimary::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  background-size: 200% 100%;
  animation: shimmer 2.5s infinite;
}
.btnPrimary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(255,45,122,.5); }
.btnPrimary:active { transform: translateY(0); }
.btnPrimary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.btnGhost {
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 14px;
  background: rgba(255,255,255,.04);
  color: var(--sub);
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.btnGhost:hover { border-color: rgba(255,255,255,.3); color: var(--tx); }

/* ── 进度条 ── */
.progressWrap { margin-top: 18px; animation: fadeUp .6s .35s ease both; }
.barTrack {
  height: 6px; border-radius: 999px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.08);
  overflow: hidden;
}
.barFill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent3), #60a5fa, var(--accent));
  border-radius: 999px;
  transition: width .4s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.barFill::after {
  content: "";
  position: absolute; right: 0; top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 10px rgba(255,255,255,.8);
}
.ptext { margin-top: 8px; color: var(--sub); font-size: 11px; letter-spacing: .5px; }

.helpText {
  margin-top: 12px; padding: 12px 14px;
  border: 1px solid rgba(255,209,102,.2);
  border-radius: 12px;
  background: rgba(255,209,102,.05);
  color: var(--sub); font-size: 12px; line-height: 1.8;
}

.miniTip {
  margin-top: 10px; color: rgba(255,255,255,.2); font-size: 11px; line-height: 1.7;
  animation: fadeUp .6s .4s ease both;
}

/* ── 题目区 ── */
.quizCard {
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 24px;
  padding: 24px 20px;
  background: linear-gradient(160deg, rgba(255,45,122,.07), rgba(108,31,255,.1), rgba(4,5,15,.95));
  animation: fadeUp .4s ease both;
}

.qMeta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.qNum {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 2px;
  color: var(--accent3);
}
.qDots { display: flex; gap: 3px; }
.qDot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,.12);
  transition: background .3s;
}
.qDot.done { background: var(--accent3); }
.qDot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

.qtitle {
  font-size: clamp(15px, 4vw, 17px);
  font-weight: 700; line-height: 1.65;
  margin-bottom: 18px;
  font-family: 'Noto Serif SC', serif;
  color: #fff;
}

.opts { display: grid; gap: 10px; }

label.opt {
  display: block; cursor: pointer;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px;
  padding: 2px;
  background: linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
  transition: transform .12s ease, border-color .15s ease, box-shadow .15s ease;
  position: relative; overflow: hidden;
}
label.opt::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.03), transparent);
  opacity: 0; transition: opacity .2s;
}
label.opt:hover {
  transform: translateY(-2px);
  border-color: rgba(0,229,176,.4);
  box-shadow: 0 8px 24px rgba(0,0,0,.4), 0 0 0 1px rgba(0,229,176,.15);
}
label.opt:hover::before { opacity: 1; }

label.opt.selected {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(255,45,122,.15), rgba(108,31,255,.12));
  box-shadow: 0 0 0 1px rgba(255,45,122,.3), 0 8px 28px rgba(255,45,122,.2);
}

.optInner {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 14px;
  border-radius: 14px;
}
.optKey {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; flex-shrink: 0;
  border-radius: 10px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 1px;
  color: var(--sub);
  transition: background .15s, color .15s, border-color .15s;
}
label.opt.selected .optKey {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 16px rgba(255,45,122,.5);
}
.optTxt { font-size: 13.5px; line-height: 1.65; color: rgba(255,255,255,.8); padding-top: 4px; }

input[type="radio"] { display: none; }

.navRow {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px;
}
.btnSmall {
  padding: 9px 14px;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 12px;
  background: rgba(255,255,255,.04);
  color: var(--sub); font-size: 12px;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  transition: all .15s;
}
.btnSmall:hover { border-color: rgba(255,255,255,.25); color: var(--tx); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 32px; left: 50%; z-index: 9999;
  transform: translateX(-50%) translateY(20px);
  padding: 12px 20px; border-radius: 14px;
  background: rgba(10,10,30,.96);
  border: 1px solid rgba(255,45,122,.4);
  color: var(--tx); font-size: 13px;
  box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,45,122,.2);
  opacity: 0; pointer-events: none;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  max-width: calc(100vw - 40px);
}
#toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

/* ── Loading ── */
#loadingOverlay {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(4,5,15,.95);
  backdrop-filter: blur(20px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity .4s;
}
.loaderRing {
  position: relative; width: 72px; height: 72px; margin-bottom: 28px;
}
.loaderRing::before, .loaderRing::after {
  content: "";
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid transparent;
  animation: spin 1.4s linear infinite;
}
.loaderRing::before {
  border-top-color: var(--accent);
  border-right-color: var(--accent2);
}
.loaderRing::after {
  border-bottom-color: var(--accent3);
  animation-direction: reverse;
  animation-duration: 1s;
  inset: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loaderInner {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.loadStatus {
  font-size: 13px; color: var(--sub); letter-spacing: 1px;
  text-align: center; max-width: 240px; line-height: 1.7;
}
.loadDots::after {
  content: "";
  animation: dots 1.5s infinite;
}
@keyframes dots {
  0%  { content: ""; }
  25% { content: "."; }
  50% { content: ".."; }
  75% { content: "..."; }
}

/* ── 结果区 ── */
#result { animation: fadeUp .5s ease both; }

.resultOuter {
  position: relative;
  border-radius: 28px; overflow: hidden;
  margin-bottom: 16px;
}
.resultOuter::before {
  content: "";
  position: absolute; inset: -2px; border-radius: 30px; z-index: -1;
  background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent3), var(--gold), var(--accent));
  animation: borderSpin 4s linear infinite;
}
@property --angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }

.resultCard {
  border-radius: 26px; padding: 28px 22px;
  background: linear-gradient(160deg, rgba(255,45,122,.14) 0%, rgba(108,31,255,.16) 50%, rgba(4,5,20,.98) 100%);
  border: 1px solid rgba(255,255,255,.1);
  animation: resultIn .8s cubic-bezier(.22,1,.36,1) both;
  position: relative; overflow: hidden;
}
.resultCard::after {
  content: "";
  position: absolute; top: -60%; right: -20%;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,45,122,.12), transparent 65%);
  pointer-events: none;
}

.resType {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 3px;
  color: var(--accent3); margin-bottom: 10px;
  animation: fadeUp .4s .2s ease both;
}

.resTitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(26px, 7vw, 40px);
  line-height: 1.1; letter-spacing: 1px;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: fadeUp .4s .3s ease both;
}
.resAka {
  color: var(--sub); font-size: 12px; margin-bottom: 18px;
  animation: fadeUp .4s .35s ease both;
}

/* 分数条 */
.scoreGrid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: 20px;
  animation: fadeUp .4s .4s ease both;
}
.scoreItem {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px; padding: 10px 12px;
}
.scoreLabel { font-size: 10px; color: var(--sub); margin-bottom: 6px; letter-spacing: .5px; }
.scoreBar {
  height: 4px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden;
}
.scoreBarFill {
  height: 100%; border-radius: 999px;
  transition: width 1s cubic-bezier(.34,1.56,.64,1);
  width: 0%;
}
.scoreBarFill.A { background: linear-gradient(90deg, #22c55e, #86efac); }
.scoreBarFill.B { background: linear-gradient(90deg, var(--accent), #ff8fb3); }
.scoreBarFill.C { background: linear-gradient(90deg, #60a5fa, #818cf8); }
.scoreBarFill.D { background: linear-gradient(90deg, var(--gold), #fde68a); }
.scoreVal { font-size: 12px; color: var(--tx); margin-top: 4px; text-align: right; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }

.divLine { height: 1px; background: rgba(255,255,255,.08); margin: 18px 0; }

.resBody {
  font-size: 13.5px; line-height: 2; color: rgba(255,255,255,.82);
  font-family: 'Noto Serif SC', serif;
  animation: fadeUp .4s .5s ease both;
}
.resBody .section-title {
  display: block; font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 3px; color: var(--accent3);
  margin-top: 18px; margin-bottom: 8px;
}
.resBody .highlight {
  background: linear-gradient(135deg, rgba(255,45,122,.2), rgba(108,31,255,.2));
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
  padding: 10px 14px; margin: 10px 0;
  font-size: 13px; color: rgba(255,255,255,.9);
}
.resBody strong { color: #fff; }

/* 结果底部操作 */
.resActions {
  display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px;
}

/* 截图预览 */
.shotSection { margin-top: 14px; animation: fadeUp .5s ease both; }
.shotLabel { font-size: 11px; color: var(--sub); margin-bottom: 10px; letter-spacing: .5px; }
.shotImg {
  width: 100%; border-radius: 20px;
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
}

/* ── 头像 (CSS艺术) ── */
.avatarWrap {
  display: inline-block;
  animation: floatBob 3s ease-in-out infinite;
  margin-bottom: 20px;
}
.avatarCard {
  width: 100px; height: 130px; border-radius: 22px;
  position: relative; overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,.6);
}
.avatarBg-A { background: linear-gradient(145deg, #1a0a2e, #0d1f2d); border: 1px solid rgba(34,197,94,.3); }
.avatarBg-B { background: linear-gradient(145deg, #1f0a1a, #2d0d0d); border: 1px solid rgba(255,45,122,.3); }
.avatarBg-C { background: linear-gradient(145deg, #0a1a2e, #0d1040); border: 1px solid rgba(96,165,250,.3); }

async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const colors = ['rgba(255,45,122,', 'rgba(108,31,255,', 'rgba(0,229,176,', 'rgba(255,209,102,'];

  class Particle {
    constructor(){
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.size = Math.random() * 1.5 + .3;
      this.vx = (Math.random() - .5) * .3;
      this.vy = (Math.random() - .5) * .3;
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.alpha = Math.random() * .4 + .05;
    }
    update(){
      this.x += this.vx; this.y += this.vy;
      if(this.x < 0) this.x = W;
      if(this.x > W) this.x = 0;
      if(this.y < 0) this.y = H;
      if(this.y > H) this.y = 0;
    }
    draw(){
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fillStyle = this.color + this.alpha + ')';
      ctx.fill();
    }
  }

  for(let i = 0; i < 80; i++) particles.push(new Particle());

  // 连线
  function drawLines(){
    for(let i = 0; i < particles.length; i++){
      for(let j = i+1; j < particles.length; j++){
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if(d < 120){
          ctx.beginPath();
          ctx.strokeStyle = `rgba(255,255,255,${(1 - d/120) * .04})`;
          ctx.lineWidth = .5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => { p.update(); p.draw(); });
    drawLines();
    requestAnimationFrame(loop);
  }
  loop();
})();

let audioCtx;
function playTick(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(520, t);
    o.frequency.exponentialRampToValueAtTime(460, t + .06);
    g.gain.setValueAtTime(.0001, t);
    g.gain.exponentialRampToValueAtTime(.04, t + .01);
    g.gain.exponentialRampToValueAtTime(.0001, t + .1);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + .12);
  }catch(e){}
}
function playSuccess(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();

      const t = audioCtx.currentTime + i * .12;

      g.gain.setValueAtTime(.0001, t);
      g.gain.exponentialRampToValueAtTime(.06, t+.02);

      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t+.2);
    });
  }catch(e){}
}

// ══════════════════════════════════
//  状态
// ══════════════════════════════════
const $ = id => document.getElementById(id);
let idx = 0, answers = Array(QUESTIONS.length).fill(null);

function showOnly(which){
  ['gate','quiz','result'].forEach(id => {
    const el = $(id);
    if(el) which === id ? el.classList.remove('hidden') : el.classList.add('hidden');
  });
}

function updateProgress(){
  const done = answers.filter(x=>x!==null).length;
  $('ptext').textContent = `进度：${done} / ${QUESTIONS.length}`;
  $('fill').style.width = Math.round(done/QUESTIONS.length*100) + '%';
}

// ══════════════════════════════════
//  渲染题目
// ══════════════════════════════════
function renderQuestion(){
  const q = QUESTIONS[idx];
  const letters = ['A','B','C','D'];

  // 点状进度
  const dots = QUESTIONS.map((_,i) => {
    let cls = 'qDot';
    if(answers[i] !== null) cls += ' done';
    if(i === idx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  $('quiz').innerHTML = `
    <div class="quizCard">
      <div class="qMeta">
        <div class="qNum">Q${String(idx+1).padStart(2,'0')} / ${QUESTIONS.length}</div>
        <div class="qDots">${dots}</div>
      </div>
      <p class="qtitle">${q.t}</p>
      <div class="opts">
        ${letters.map(k => `
          <label class="opt${answers[idx]===k?' selected':''}" id="opt${k}">
            <input type="radio" name="q${idx}" value="${k}">
            <div class="optInner">
              <div class="optKey">${k}</div>
              <div class="optTxt">${q.o[k]}</div>
            </div>
          </label>
        `).join('')}
      </div>
      <div class="navRow">
        <button class="btnSmall" id="prevBtn">← 上一题</button>
        <button class="btnSmall" id="nextBtn">下一题 →</button>
        <button class="btnSmall" id="backBtn">返回首页</button>
      </div>
    </div>
  `;

  // 绑定选项
  $('quiz').querySelectorAll('input[type="radio"]').forEach(r => {
    r.addEventListener('change', e => {
      playTick();
      answers[idx] = e.target.value;
      updateProgress();

      // 高亮选中
      $('quiz').querySelectorAll('label.opt').forEach(l => l.classList.remove('selected'));
      document.getElementById('opt'+e.target.value).classList.add('selected');

      setTimeout(() => {
        if(idx === QUESTIONS.length - 1){
          if(answers.every(x=>x!==null)) showResult();
          else { showToast('还有题没选哦，可以用上一题回头看看'); }
        } else {
          idx++;
          renderQuestion();
          window.scrollTo({top:0, behavior:'instant'});
        }
      }, 260);
    });
  });

  $('prevBtn').onclick = () => {
    if(idx > 0){ idx--; renderQuestion(); window.scrollTo({top:0,behavior:'instant'}); }
    else showToast('已经是第一题啦');
  };
  $('nextBtn').onclick = () => {
    if(!answers[idx]){ showToast('这题还没选哦 👆'); return; }
    if(idx < QUESTIONS.length - 1){ idx++; renderQuestion(); window.scrollTo({top:0,behavior:'instant'}); }
    else if(answers.every(x=>x!==null)) showResult();
    else showToast('还有题没选完哦');
  };
  $('backBtn').onclick = resetAll;
}

// ══════════════════════════════════
//  计算类型
// ══════════════════════════════════
function computeType(){
  const score = {A:0,B:0,C:0,D:0};
  answers.forEach(a => { if(a) score[a]++; });
  const priority = {C:4,D:3,A:2,B:1};
  return Object.entries(score).sort((x,y) => {
    if(y[1]!==x[1]) return y[1]-x[1];
    return priority[y[0]] - priority[x[0]];
  })[0][0];
}

// ══════════════════════════════════
//  显示结果
// ══════════════════════════════════
function showResult(){
  const overlay = $('loadingOverlay');
  overlay.classList.remove('hidden');

  const msgs = [
    '正在量子纠缠你的财富时间线',
    '正在从链上解码你的金钱DNA',
    '正在和2026年的你远程对线',
    '画像生成完成，正在签发赛博人格卡'
  ];
  let mi = 0;
  const iv = setInterval(() => {
    mi++;
    if(mi < msgs.length){
      const el = $('loadStatus');
      if(el) el.querySelector('.loadDots').textContent = msgs[mi];
    }
  }, 620);

  setTimeout(() => {
    clearInterval(iv);
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.classList.add('hidden');
      overlay.style.opacity = '';
    }, 400);

    const type = computeType();
    const t = TYPES[type];
    const score = {A:0,B:0,C:0,D:0};
    answers.forEach(a => { if(a) score[a]++; });

    // 分数条
    const scoreHTML = Object.entries(score).map(([k,v]) => `
      <div class="scoreItem">
        <div class="scoreLabel">${{A:'稳妥守财',B:'机会冲浪',C:'自我增值',D:'人脉联结'}[k]}</div>
        <div class="scoreBar"><div class="scoreBarFill ${k}" data-pct="${Math.round(v/QUESTIONS.length*100)}"></div></div>
        <div class="scoreVal">${v} 题</div>
      </div>
    `).join('');

    // 正文
    const bodyHTML = t.sections.map(s => `
      <span class="section-title">${s.label}</span>
      ${s.highlight
        ? `<div class="highlight">${s.body.replace(/\n/g,'<br>')}</div>`
        : `<p style="margin-bottom:10px">${s.body.replace(/\n/g,'<br>')}</p>`
      }
    `).join('');

    $('resultCard').innerHTML = `
      ${avatarHTML(type)}
      <div class="resType">你的搞钱体质类型</div>
      <div class="resTitle">${t.title}</div>
      <div class="resAka">${t.aka}</div>
      <div class="scoreGrid">${scoreHTML}</div>
      <div class="divLine"></div>
      <div class="resBody">${bodyHTML}</div>
    `;

    showOnly('result');
    $('shotWrap').classList.add('hidden');
    playSuccess();
    window.scrollTo({top:0, behavior:'smooth'});

    // 延迟触发分数条动画
    requestAnimationFrame(() => {
      setTimeout(() => {
        document.querySelectorAll('.scoreBarFill').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }, 400);
    });

  }, 2600);
}

// ══════════════════════════════════
//  重置
// ══════════════════════════════════
function resetAll(){
  idx = 0; answers = Array(QUESTIONS.length).fill(null);
  updateProgress(); $('code').value = '';
  showOnly('gate'); $('shotWrap').classList.add('hidden');
  window.scrollTo({top:0, behavior:'instant'});
}

// ══════════════════════════════════
//  截图 (dom-to-image-more，Safari兼容)
// ══════════════════════════════════
function generateShot(){
  const node = $('resultCard');
  $('shotBtn').disabled = true;
  $('shotBtn').textContent = '生成中…';

  domtoimage.toPng(node, {
    bgcolor: '#04050f',
    style: { borderRadius: '26px' }
  }).then(dataUrl => {
    const img = $('shotImg');
    img.src = dataUrl;
    $('shotWrap').classList.remove('hidden');
    $('shotBtn').disabled = false; $('shotBtn').textContent = '重新生成截图';
    showToast('截图已生成，长按图片保存 ✓');
    setTimeout(() => window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'}), 100);
  }).catch(() => {
    $('shotBtn').disabled = false; $('shotBtn').textContent = '生成截图卡片';
    showToast('截图失败，请截屏保存 📸');
  });
}

function buildShareText(){
  const type = computeType();

  return `刚测了《2026钱味觉醒测试》，结果有点狠…

我是：${t.title} ${t.aka}

一句话总结：
${t.share}

你们也去测一下，评论告诉我你是什么体质 ↓`;
}

async function copyShareText(){
  const text = buildShareText();
  let copied = false;
  try{
    if(navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(text);
      copied = true;
    }
  }catch(e){}
  if(copied){
    showToast('分享文案已复制，直接粘贴发朋友圈/小红书 ✓', 3500);
  } else {
    window.prompt('长按全选复制这段分享文案：', text);
  }
}
