<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>2026 钱味觉醒测试｜完整版</title>
  <style>
    :root{
      --bg:#050610;
      --tx:#EAF0FF;
      --sub:#AAB3CF;
      --bd:rgba(255,255,255,.14);
      --glass:rgba(255,255,255,.07);
      --glass2:rgba(255,255,255,.04);
      --shadow: 0 14px 60px rgba(0,0,0,.45);
      --max:980px;

      --a:#7C3AED; /* 紫 */
      --b:#FF3D8D; /* 粉 */
      --c:#22C55E; /* 绿 */
      --d:#60A5FA; /* 蓝 */
      --y:#F59E0B; /* 黄 */
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--tx);
      background:
        radial-gradient(900px 600px at 12% 10%, rgba(255,61,141,.25), transparent 60%),
        radial-gradient(900px 600px at 88% 25%, rgba(124,58,237,.26), transparent 60%),
        radial-gradient(900px 600px at 68% 90%, rgba(34,197,94,.18), transparent 60%),
        radial-gradient(800px 520px at 35% 70%, rgba(96,165,250,.18), transparent 55%),
        var(--bg);
      padding:16px 12px 48px;
    }

    .wrap{max-width:var(--max);margin:0 auto}
    .hidden{display:none !important}

    .hero{
      border:1px solid var(--bd);
      background:linear-gradient(180deg, var(--glass), var(--glass2));
      border-radius:22px;
      padding:16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .space{justify-content:space-between}
    h1{margin:0 0 6px;font-size:18px;letter-spacing:.2px}
    .sub{margin:0;color:var(--sub);font-size:13px;line-height:1.65}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 12px;border-radius:999px;border:1px solid var(--bd);
      background:rgba(255,255,255,.05);
      font-size:12px;color:var(--sub);
      user-select:none;
    }

    .card{
      margin-top:12px;
      border:1px solid var(--bd);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius:22px;
      padding:14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    input{
      width:min(420px, 100%);
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.18);
      color:var(--tx);
      border-radius:16px;
      padding:12px 12px;
      font-size:14px;
      outline:none;
    }
    input::placeholder{color:#97A3B8}

    button{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--tx);
      border-radius:16px;
      padding:12px 14px;
      font-weight:1000;
      cursor:pointer;
    }
    button.primary{
      border-color:transparent;
      background:linear-gradient(90deg, var(--b), var(--a), var(--d));
    }
    button.secondary{
      border-color:transparent;
      background:linear-gradient(90deg, rgba(245,158,11,.9), rgba(255,61,141,.75));
    }
    button:disabled{opacity:.5;cursor:not-allowed}

    .progressWrap{margin-top:10px}
    .bar{
      height:10px;border-radius:999px;background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);overflow:hidden;
    }
    .fill{height:100%;width:0%;background:linear-gradient(90deg, var(--c), var(--d), var(--a), var(--b))}
    .ptext{margin-top:8px;color:var(--sub);font-size:12px}

    .divider{height:1px;background:rgba(255,255,255,.12);margin:12px 0}

    /* Quiz */
    .qtitle{margin:0 0 10px;font-size:15px;font-weight:1100;line-height:1.4}
    .mini{color:var(--sub);font-size:12px;line-height:1.6}
    .opts{display:grid;gap:10px}
    label.opt{
      display:block;cursor:pointer;
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border-radius:18px;
      padding:12px;
      transition:transform .08s ease, border-color .12s ease;
    }
    label.opt:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.28)}
    .k{
      display:inline-flex;align-items:center;justify-content:center;
      width:30px;height:30px;border-radius:11px;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
      font-weight:1100;flex:0 0 auto;
    }
    .inner{display:flex;gap:10px;align-items:flex-start}
    .otxt{line-height:1.45;font-size:14px}
    input[type="radio"]{display:none}
    input[type="radio"]:checked + .inner{
      outline:2px solid rgba(255,61,141,.55);
      border-radius:12px;padding:6px;
    }

    .navRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}

    /* Result */
    .resultCard{
      padding:14px;border-radius:22px;border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(600px 420px at 20% 20%, rgba(255,61,141,.24), transparent 60%),
        radial-gradient(620px 420px at 80% 30%, rgba(124,58,237,.22), transparent 60%),
        radial-gradient(640px 420px at 60% 90%, rgba(96,165,250,.18), transparent 60%),
        rgba(255,255,255,.04);
    }
    .badge{
      display:inline-block;padding:7px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      font-size:12px;font-weight:1100;
    }
    .big{font-size:22px;font-weight:1200;margin:8px 0 6px}
    .one{font-weight:1000;line-height:1.55}
    .grid{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:12px;
      align-items:stretch;
    }
    @media (max-width: 720px){
      .grid{grid-template-columns:1fr}
    }
    .box{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      border-radius:18px;
      padding:12px;
    }
    .h3{margin:0 0 8px;font-size:13px;font-weight:1100;color:#EAF0FF}
    .list{font-size:13px;line-height:1.75;color:#DDE6FF}
    .share{
      white-space:pre-wrap;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.14);
      padding:12px;border-radius:16px;
      font-size:13px;line-height:1.55;color:#EAF0FF;
    }
    .toast{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
      background:#0b1220;border:1px solid rgba(255,255,255,.14);color:#e5e7eb;
      padding:10px 12px;border-radius:14px;font-size:13px;
      opacity:0;pointer-events:none;transition:.18s;
    }
    .toast.show{opacity:1}
    .warn{color:#FFD38A;font-weight:900}
  </style>
</head>

<body>
  <div class="wrap">

    <!-- 1) Gate: only shows password -->
    <section class="hero" id="gate">
      <div class="row space">
        <div>
          <h1>2026 钱味觉醒测试｜完整版</h1>
          <p class="sub">
            不是算命、不预测。就是一份<strong>“你适合怎么搞钱”的性格画像</strong>。<br>
            测完会生成<strong>钱味卡片</strong>＋2026行动清单（建议截图）。
          </p>
        </div>
        <div class="pill">⏱ 20题｜约2分钟｜更像MBTI</div>
      </div>

      <div class="row" style="margin-top:12px">
        <input id="code" placeholder="输入神秘口令（订单自动回复里）" />
        <button class="primary" id="unlock">开始测我的钱味</button>
        <button id="help">打不开？</button>
      </div>

      <div class="progressWrap">
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div class="ptext" id="ptext">进度：0 / 20</div>
      </div>

      <p class="mini hidden" id="helpText" style="margin-top:10px">
        解决方法：1) 刷新页面 2) 换 Safari/Chrome 3) 仍不行：回到小红书回复“打不开”，我会补发备用入口/口令。<br>
        <span class="warn">提示：</span>口令建议 3 天一换。
      </p>
    </section>

    <!-- 2) Quiz: only shows questions -->
    <section class="card hidden" id="quiz"></section>

    <section class="card hidden" id="nav">
      <div class="navRow">
        <button id="prev">上一题</button>
        <button id="next" class="primary">下一题</button>
        <button id="submit" class="secondary hidden">出结果（钱味卡片）</button>
        <button id="reset">重做</button>
      </div>
      <div class="mini" style="margin-top:10px">
        小红书测试潜规则：别纠结，按第一反应选，越纠结越测不准。
      </div>
    </section>

    <!-- 3) Result: only shows result -->
    <section class="card hidden" id="result">
      <div class="resultCard" id="resultCard"></div>

      <div class="divider"></div>

      <div class="grid">
        <div class="box">
          <div class="h3">你的“钱味报告”（像MBTI那种）</div>
          <div class="list" id="report"></div>
        </div>

        <div class="box">
          <div class="h3">一条就够的 2026 今日任务</div>
          <div class="list" id="task"></div>
          <div class="divider"></div>
          <div class="h3">复制分享文案</div>
          <div class="share" id="share"></div>
          <div class="navRow">
            <button id="copy">复制文案</button>
            <button id="back" class="primary">再测一次</button>
          </div>
        </div>
      </div>

      <p class="mini" style="margin-top:10px">
        免责声明：仅作个人倾向分析，不构成投资/理财建议；不承诺任何收益或结果。
      </p>
    </section>

  </div>

  <div class="toast" id="toast">已复制 ✅</div>

<script>

      avoid:["情绪化加仓","没有止损/止盈","把运气当能力"],
      mission:"2026 主线任务：把机会变成“节奏”（先小后大 + 规则落袋）。",
      task:"今天就做：写下你的“最大亏损上限”——触发就停止操作 48 小时。"
    },
    C:{
      code:"C",
      name:"升级涨价派（认知套利型）",
      title:"你适合的不是“更努力”，是“把自己卖更贵”。",
      tagline:"你靠能力与信息差变富：关键是把学习变成可售交付物。",
      superpower:"会复盘会迭代：别人瞎忙，你能把方法打磨成体系。",
      bug:"研究过头：收藏一堆干货，但交付太少。",
      bestFit:["技能变现：接单/咨询/课程/模板","做作品集型副业：Notion/简历/面试/技能包","产品化：把经验做成可卖的东西"],
      avoid:["只学不发","追求完美不发布","没有定价意识"],
      mission:"2026 主线任务：把能力变成“产品”（可展示、可复用、可定价）。",
      task:"今天就做：写一个“你能卖的服务清单”（3项）+ 每项一个价格（哪怕先写出来）。"
    },
    D:{
      code:"D",
      name:"组队放大派（资源整合型）",
      title:"你赚钱的上限取决于：你能撬动多少人和资源。",
      tagline:"你靠合作与杠杆放大结果：规则比关系更重要。",
      superpower:"你能把人拧成一股绳：组织、推进、合作谈判是你的强项。",
      bug:"边界不清：合作一开始热情满满，最后变成你在扛。",
      bestFit:["项目型副业：合伙/渠道/分销/联名","运营/PM/BD/社区主理人","系统化协作：SOP/流程/报价模型"],
      avoid:["口头约定","不写清分工结算","人情消耗式合作"],
      mission:"2026 主线任务：把合作做成“可复制模型”（流程+模板+报价）。",
      task:"今天就做：把你最近一次合作的“分工/交付/结算”写成1页模板，下次直接套用。"
    }
  };

  // ---------- state ----------
  const $ = (id)=>document.getElementById(id);
  const gate = $("gate");
  const quiz = $("quiz");
  const nav = $("nav");
  const result = $("result");
  const fill = $("fill");
  const ptext = $("ptext");
  const toast = $("toast");

  let idx = 0;
  const answers = Array(QUESTIONS.length).fill(null);

  function toastShow(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"), 900);
  }

  function updateProgress(){
    const done = answers.filter(x=>x!==null).length;
    ptext.textContent = `进度：${done} / ${QUESTIONS.length}`;
    fill.style.width = `${Math.round(done/QUESTIONS.length*100)}%`;
  }

  function renderQuestion(){
    const q = QUESTIONS[idx];
    const picked = answers[idx];

    quiz.innerHTML = `
      <div>
        <p class="qtitle">${q.t}</p>
        <div class="opts">
          ${Object.entries(q.o).map(([k,v])=>`
            <label class="opt">
              <input type="radio" name="q${idx}" value="${k}" ${picked===k?"checked":""}/>
              <span class="inner">
                <span class="k">${k}</span>
                <span class="otxt">${v}</span>
              </span>
            </label>
          `).join("")}
        </div>
        <div class="mini" style="margin-top:10px">第 ${idx+1} 题 / ${QUESTIONS.length}</div>
      </div>
    `;

    quiz.querySelectorAll(`input[name="q${idx}"]`).forEach(r=>{
      r.addEventListener("change", (e)=>{
        answers[idx] = e.target.value;
        updateProgress();
        updateNavButtons();
      });
    });

    updateProgress();
    updateNavButtons();
  }

  function updateNavButtons(){
    $("prev").disabled = (idx===0);
    $("next").disabled = (answers[idx]===null);

    const allDone = answers.every(x=>x!==null);
    const atLast = idx === QUESTIONS.length-1;

    $("submit").classList.toggle("hidden", !(allDone && atLast));
    $("next").classList.toggle("hidden", (allDone && atLast));
  }

  function compute(){
    const score = {A:0,B:0,C:0,D:0};
    answers.forEach(a=>score[a]++);
    // 平分时优先：C > D > A > B（更符合“成长/产品化”导向）
    const pr = {C:4,D:3,A:2,B:1};
    const sorted = Object.entries(score).sort((x,y)=>{
      if(y[1]!==x[1]) return y[1]-x[1];
      return pr[y[0]]-pr[x[0]];
    });
    return {type: sorted[0][0], score};
  }

  function showOnly(section){
    // gate / quiz+nav / result 三段互斥
    gate.classList.add("hidden");
    quiz.classList.add("hidden");
    nav.classList.add("hidden");
    result.classList.add("hidden");

    if(section==="gate") gate.classList.remove("hidden");
    if(section==="quiz"){ quiz.classList.remove("hidden"); nav.classList.remove("hidden"); }
    if(section==="result") result.classList.remove("hidden");
  }

  function showResult(){
    const {type, score} = compute();
    const t = TYPE[type];
    const scoreLine = `A:${score.A}  B:${score.B}  C:${score.C}  D:${score.D}`;

    $("resultCard").innerHTML = `
      <div class="badge">${t.code} 类｜${t.name}</div>
      <div class="big">你的钱味：${t.name}</div>
      <div class="one">${t.title}</div>
      <div class="mini" style="margin-top:6px">${t.tagline}</div>
      <div class="divider"></div>
      ${svgFor(type)}
      <div class="mini" style="margin-top:10px">得分：${scoreLine}（建议截图保存这张卡）</div>
    `;

    const report = `
      <p><b>🧬 你的人设：</b>${t.name}</p>
      <p><b>🔥 搞钱超能力：</b>${t.superpower}</p>
      <p><b>🕳️ 致命BUG：</b>${t.bug}</p>
      <p><b>🎯 适合的路子：</b><br>• ${t.bestFit.join("<br>• ")}</p>
      <p><b>🚫 你最好避开的坑：</b><br>• ${t.avoid.join("<br>• ")}</p>
      <p><b>🗺️ 2026主线任务：</b>${t.mission}</p>
    `;
    $("report").innerHTML = report;

    $("task").innerHTML = `• ${t.task}`;

    $("share").textContent = [
      `我测出来是「${t.name}」`,
      `一句话：${t.title}`,
      `得分：${scoreLine}`,
      `#钱味觉醒测试 #2026财富增长模式`
    ].join("\n");

    showOnly("result");
    window.scrollTo({top:0, behavior:"smooth"});
  }

  // ---------- events ----------
  $("unlock").addEventListener("click", ()=>{
    const v = ($("code").value || "").trim();
    if(v !== TODAY_CODE){
      alert("口令不正确。请回到小红书订单自动回复查看「神秘口令」。");
      return;
    }
    // 进入题目后，口令页完全隐藏（互斥显示）
    showOnly("quiz");
    renderQuestion();
  });

  $("help").addEventListener("click", ()=>{
    $("helpText").classList.toggle("hidden");
  });

  $("prev").addEventListener("click", ()=>{ idx--; renderQuestion(); });
  $("next").addEventListener("click", ()=>{ idx++; renderQuestion(); });
  $("submit").addEventListener("click", ()=> showResult());

  $("reset").addEventListener("click", ()=>{
    for(let i=0;i<answers.length;i++) answers[i]=null;
    idx=0;
    showOnly("quiz");
    renderQuestion();
    window.scrollTo({top:0, behavior:"smooth"});
  });

  $("back").addEventListener("click", ()=>{
    for(let i=0;i<answers.length;i++) answers[i]=null;
    idx=0;
    $("code").value = "";
    updateProgress();
    showOnly("gate"); // 回到口令页
    window.scrollTo({top:0, behavior:"smooth"});
  });

  $("copy").addEventListener("click", async ()=>{
    try{
      await navigator.clipboard.writeText($("share").textContent);
      toastShow("已复制 ✅");
    }catch(e){
      alert("复制失败：请手动长按复制。");
    }
  });

  updateProgress();
</script>
</body>
</html>
