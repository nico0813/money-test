  // ====== DOM 快捷 ======
  const $ = id => document.getElementById(id);
  const gate = $("gate");
  const quiz = $("quiz");
  const result = $("result");
  const shotWrap = $("shotWrap");
  const fill = $("fill");
  const ptext = $("ptext");

  let idx = 0;
  const answers = Array(QUESTIONS.length).fill(null); // 存 A/B/C/D

  function showOnly(which){
    gate.classList.add("hidden");
    quiz.classList.add("hidden");
    result.classList.add("hidden");
    if(which==="gate") gate.classList.remove("hidden");
    if(which==="quiz") quiz.classList.remove("hidden");
    if(which==="result") result.classList.remove("hidden");
  }

  function updateProgress(){
    const done = answers.filter(x=>x!==null).length;
    ptext.textContent = `进度：${done} / ${QUESTIONS.length}`;
    fill.style.width = `${Math.round(done/QUESTIONS.length*100)}%`;
  }

  function renderQuestion(){
    const q = QUESTIONS[idx];
    const letters = ["A","B","C","D"];
    quiz.innerHTML = `
      <div>
        <div class="qindex">第 ${idx+1} 题 / ${QUESTIONS.length}</div>
        <p class="qtitle">${q.t}</p>
        <div class="opts">
          ${letters.map(k=>`
            <label class="opt">
              <input type="radio" name="q${idx}" value="${k}">
              <div class="inner">
                <div class="k">${k}</div>
                <div class="otxt">${q.o[k]}</div>
              </div>
            </label>
          `).join("")}
        </div>
        <div class="navRow">
          <button id="prevBtn">上一题</button>
          <button id="nextBtn">下一题</button>
          <button id="backBtn">返回最开始</button>
        </div>
        <p class="mini" style="margin-top:6px">提示：点选选项会自动跳到下一题，想回头改可以用「上一题」。</p>
      </div>
    `;

    // 恢复已选
    if(answers[idx]){
      const v = answers[idx];
      const input = quiz.querySelector(`input[value="${v}"]`);
      if(input) input.checked = true;
    }

    // 选项监听：自动进入下一题
    quiz.querySelectorAll(`input[name="q${idx}"]`).forEach(r=>{
      r.addEventListener("change", e=>{
        const v = e.target.value;
        answers[idx] = v;
        updateProgress();
        if(idx === QUESTIONS.length - 1){
          showResult();
        }else{
          idx++;
          renderQuestion();
          window.scrollTo({top:0,behavior:"instant"});
        }
      });
    });

    // 导航按钮
    $("prevBtn").onclick = () => {
      if(idx>0){
        idx--;
        renderQuestion();
        window.scrollTo({top:0,behavior:"instant"});
      }
    };
    $("nextBtn").onclick = () => {
      if(idx < QUESTIONS.length - 1){
        idx++;
        renderQuestion();
        window.scrollTo({top:0,behavior:"instant"});
      }else{
        // 最后一题点“下一题”如果都答完就出结果
        if(answers.every(x=>x!==null)) showResult();
        else alert("还有题没选完哦，可以直接点选选项自动跳题。");
      }
    };
    $("backBtn").onclick = resetAll;

  function computeType(){
    const score = {A:0,B:0,C:0,D:0};
    answers.forEach(a=>{ if(a) score[a]++; });
    const priority = {C:4,D:3,A:2,B:1}; // 打平时优先级
    const sorted = Object.entries(score).sort((x,y)=>{
      if(y[1]!==x[1]) return y[1]-x[1];
      return priority[y[0]] - priority[x[0]];
    });
    return sorted[0][0]; // 返回 A/B/C/D
  }

    shotWrap.classList.add("hidden");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function resetAll(){
    idx = 0;
    for(let i=0;i<answers.length;i++) answers[i]=null;
    updateProgress();
    $("code").value = "";
    showOnly("gate");
    shotWrap.classList.add("hidden");
    window.scrollTo({top:0,behavior:"instant"});
  }

  // 截图生成：不下载，只生成图片
  function generateShot(){
    const node = $("resultCard");
    html2canvas(node,{backgroundColor:null}).then(canvas=>{
      const img = $("shotImg");
      img.src = canvas.toDataURL("image/png");
      shotWrap.classList.remove("hidden");
      window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
    }).catch(()=>alert("截图失败，可以稍后重试一次。"));
  }

  // 事件绑定
  $("unlock").onclick = () => {
    const v = ($("code").value || "").trim();
    if(v !== TODAY_CODE){
      alert("口令不对。请回小红书订单自动回复里确认一下。");
      return;
    }
    idx = 0;
    for(let i=0;i<answers.length;i++) answers[i]=null;
    updateProgress();
    showOnly("quiz");
    renderQuestion();
    window.scrollTo({top:0,behavior:"instant"});
  };

  $("shotBtn").onclick = generateShot;
  $("againBtn").onclick = resetAll;

  // 初始进度
  updateProgress();
</script>
</body>
</html>
