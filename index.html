<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>2026 钱味觉醒测试｜完整版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root{
      --bg:#050612;
      --tx:#edf1ff;
      --sub:#a5aecb;
      --bd:rgba(255,255,255,.16);
      --glass:rgba(10,13,30,.86);
      --glass2:rgba(13,18,40,.96);
      --shadow:0 18px 60px rgba(0,0,0,.55);
      --accent:#ff3d8d;
      --accent2:#7c3aed;
      --accent3:#22c55e;
      --max:960px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--tx);
      background:
        radial-gradient(900px 600px at 10% 5%, rgba(255,61,141,.26), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(124,58,237,.28), transparent 60%),
        radial-gradient(900px 600px at 60% 90%, rgba(34,197,94,.22), transparent 60%),
        #020314;
      padding:16px 12px 48px;
    }
    .wrap{max-width:var(--max);margin:0 auto}
    .hidden{display:none !important}

    .hero,.card{
      border:1px solid var(--bd);border-radius:22px;padding:16px;
      box-shadow:var(--shadow);backdrop-filter:blur(10px);
    }
    .hero{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(11,16,40,.95));margin-bottom:14px}
    .card{background:linear-gradient(180deg, var(--glass2), var(--glass));margin-top:12px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .space{justify-content:space-between}
    h1{margin:0 0 6px;font-size:18px;letter-spacing:.2px}
    .sub{margin:0;color:var(--sub);font-size:13px;line-height:1.7}
    .pill{
      display:inline-flex;align-items:center;gap:8px;padding:7px 12px;
      border-radius:999px;border:1px solid var(--bd);
      background:rgba(255,255,255,.04);font-size:12px;color:var(--sub);
    }

    input{
      width:min(420px,100%);border:1px solid rgba(255,255,255,.2);
      background:rgba(6,9,26,.9);color:var(--tx);border-radius:16px;
      padding:11px 12px;font-size:14px;outline:none;
    }
    button{
      border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);
      color:var(--tx);border-radius:16px;padding:9px 13px;font-weight:700;
      cursor:pointer;font-size:13px;transition: 0.2s;
    }
    button.primary{border-color:transparent;background:linear-gradient(90deg, var(--accent), var(--accent2))}
    button:active{transform: scale(0.96)}

    /* 进度条 */
    .progressWrap{margin-top:10px}
    .bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
    .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent3),#60a5fa,var(--accent));transition:0.3s}
    .ptext{margin-top:8px;color:var(--sub);font-size:11px}

    /* 问题区域 */
    .qindex{color:var(--accent);font-size:12px;font-weight:700;margin-bottom:4px}
    .qtitle{margin:0 0 16px;font-size:16px;font-weight:900;line-height:1.5}
    .opts{display:grid;gap:12px}
    label.opt{
      display:block;cursor:pointer;border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);border-radius:18px;padding:12px;
    }
    .inner{display:flex;gap:12px;align-items:center}
    .k{
      display:inline-flex;align-items:center;justify-content:center;
      width:30px;height:30px;border-radius:10px;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
      font-weight:900;flex-shrink:0;
    }
    input[type="radio"]{display:none}
    input[type="radio"]:checked + .inner .k{background:var(--accent);border-color:transparent}
    input[type="radio"]:checked + .inner .otxt{color:#fff;font-weight:700}

    /* 结果卡片 */
    .resultCard{
      padding:20px;border-radius:24px;background:#050617;
      border:1px solid rgba(255,255,255,.15);position:relative;overflow:hidden;
    }
    .resultCard::before{
        content:'';position:absolute;top:0;left:0;right:0;height:4px;
        background:linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .resHead{display:flex;gap:16px;align-items:center;margin-bottom:20px}
    .avatar{
      width:64px;height:64px;border-radius:20px;
      background:linear-gradient(135deg,#ff3d8d,#7c3aed);
      display:flex;align-items:center;justify-content:center;font-size:32px;
    }
    .rtitle{font-size:20px;font-weight:900;color:#fff}
    .raka{font-size:12px;color:var(--sub);margin-top:2px}
    .resBody{font-size:14px;line-height:1.8;color:#d1d5db}
    .resBody b{color:var(--accent);font-size:15px}

    /* 仪式感加载 */
    #loadingOverlay {
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(5,6,18,0.95);backdrop-filter:blur(15px);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:9999;transition:opacity 0.4s;
    }
    .spinner{
      width:40px;height:40px;border:3px solid rgba(255,61,141,0.1);
      border-top:3px solid var(--accent);border-radius:50%;
      animation:spin 1s linear infinite;margin-bottom:20px;
    }
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .loadingText{font-size:13px;color:var(--sub);letter-spacing:1px}

    .shotImg{width:100%;border-radius:18px;margin-top:14px;border:1px solid var(--bd)}
  </style>
</head>

<body>
<div class="wrap">
  <section class="hero" id="gate">
    <div class="row space">
      <div>
        <h1>2026 钱味觉醒测试</h1>
        <p class="sub">帮你看清你脑子里的钱观，翻译成一句人话。</p>
      </div>
      <div class="pill">20题完整版</div>
    </div>
    <div class="row" style="margin-top:16px">
      <input id="code" placeholder="输入神秘口令解锁" />
      <button class="primary" id="unlock">开始觉醒</button>
    </div>
  </section>

  <section class="card hidden" id="quizWrap">
    <div class="progressWrap">
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="ptext" id="ptext">进度：0 / 20</div>
    </div>
    <div id="quiz" style="margin-top:20px"></div>
  </section>

  <section class="card hidden" id="result">
    <div class="resultCard" id="resultCard"></div>
    <div class="row" style="margin-top:20px;gap:12px">
      <button class="primary" id="shotBtn">生成结果卡片</button>
      <button id="againBtn">重新测试</button>
    </div>
    <p class="sub" style="margin-top:12px;font-size:12px">↓ 生成后长按下方图片保存至相册</p>
    <div id="shotWrap" class="hidden">
      <img id="shotImg" class="shotImg" />
    </div>
  </section>
</div>

<script>
  // 口令简单混淆 (Base64 为 WAKEN2026)
  const _0x1a2b = atob("V0FLRU4yMDI2");

  const QUESTIONS = [
    { t:"你银行卡余额低于 4 位数时，你最真实的反应是？", o:{A:"立刻焦虑，开始算钱",B:"心想：还能再搏一把",C:"自责：我是不是不够厉害",D:"想找个人倾诉"}},
    { t:"如果突然失业，你第一步会？", o:{A:"立刻削减开支",B:"找下一个更大的机会",C:"报个课，升级自己",D:"联系所有认识的人"}},
    { t:"你更害怕哪种未来？", o:{A:"不稳定",B:"错过风口",C:"被淘汰",D:"单打独斗"}},
    { t:"别人暴富，你心里最真实的一句是？", o:{A:"运气而已",B:"我也想赌一把",C:"他肯定有本事",D:"背后一定有人"}},
    { t:"你做决定时最常卡住的点？", o:{A:"安不安全",B:"值不值得赌",C:"逻辑是不是对",D:"有没有队友"}},
    { t:"你最容易在哪件事上花钱？", o:{A:"让生活更稳",B:"让自己爽",C:"提升能力",D:"维系关系"}},
    { t:"你更讨厌被说成？", o:{A:"胆小",B:"冲动",C:"只会学习",B:"只会靠人"}},
    { t:"如果机会和安全感冲突，你会？", o:{A:"选安全",B:"选机会",C:"研究更久",D:"拉人一起"}},
    { t:"你更愿意用什么换钱？", o:{A:"时间",B:"运气",C:"技能",D:"人脉"}},
    { t:"你最不甘心的是？", o:{A:"本来可以更稳",B:"本来可以更赚",C:"本来可以更强",D:"本来可以更多资源"}},
    { t:"你更相信什么能改变命运？", o:{A:"规则",B:"时机",C:"能力",D:"关系"}},
    { t:"你的人生最大焦虑是？", o:{A:"不够安全",B:"不够成功",C:"不够优秀",D:"不够有后台"}},
    { t:"当收入下降，你更容易？", o:{A:"收缩",B:"加码",C:"复盘",D:"求助"}},
    { t:"你对“稳定”的态度是？", o:{A:"必须",B:"无聊",C:"基础",D:"可以共享"}},
    { t:"你最羡慕哪种人？", o:{A:"钱多又稳",B:"一夜翻身",C:"实力碾压",D:"背景强大"}},
    { t:"你更怕什么？", o:{A:"亏钱",B:"错过",C:"退步",D:"没人撑"}},
    { t:"你最常安慰自己的一句话是？", o:{A:"稳一点就好",B:"下次一定行",C:"我再准备一下",D:"我去找人问问"}},
    { t:"你的人生更像？", o:{A:"打地基",B:"抢跑道",C:"升级打怪",D:"组队通关"}},
    { t:"如果钱不是问题，你会优先提升？", o:{A:"安全垫",B:"速度",C:"能力",D:"圈子"}},
    { t:"最后一题，你内心最真实的渴望是？", o:{A:"安心",B:"翻盘",C:"强大",D:"有人撑腰"}}
  ];

  const TYPES = {
    A:{ emoji:"💰", title:"安稳守财型 · 升级版", aka:"你不是稳，是害怕失控。", body:"<b>金钱阴影：</b>你最大的损失，往往不是亏钱，而是——在观望里，把时间让给了更激进的人。<br><br><b>2026关键点：</b>给自己一个“允许小失败”的额度。否则你永远只会站在起跑线。<br><br><b>互联网嘴替：</b>你不会最快，但你几乎不会退场。" },
    B:{ emoji:"⚡", title:"机敏逐利型 · 升级版", aka:"你不缺机会，你缺刹车。", body:"<b>金钱阴影：</b>你输的不是判断力，是节制力。<br><br><b>2026关键点：</b>只要你学会“什么时候停”，你会比大多数人走得远。<br><br><b>互联网嘴替：</b>你这辈子不会没机会，你只怕自己停不下来。" },
    C:{ emoji:"📚", title:"深耕成长型 · 升级版", aka:"你其实比别人更强，但你不敢承认。", body:"<b>金钱阴影：</b>你拖延的不是成长，是曝光。<br><br><b>2026关键点：</b>停止准备，开始出售。<br><br><b>互联网嘴替：</b>你迟早会贵，问题是，你什么时候开口要价。" },
    D:{ emoji:"🤝", title:"人脉联结型 · 升级版", aka:"你很会成全别人，但不一定会成全自己。", body:"<b>金钱阴影：</b>如果规则不写清，最后买单的人常常是你。<br><br><b>2026关键点：</b>学会谈钱，你的贵人运才会真正变现。<br><br><b>互联网嘴替：</b>你不适合躺赢，你适合带人赢。" }
  };

  const $ = id => document.getElementById(id);
  let idx = 0; const answers = Array(20).fill(null);

  $("unlock").onclick = () => {
    if($("code").value.trim() !== _0x1a2b) return alert("口令错误");
    $("gate").classList.add("hidden");
    $("quizWrap").classList.remove("hidden");
    render();
  };

  function render(){
    const q = QUESTIONS[idx];
    $("quiz").innerHTML = `
      <div class="qindex">QUESTION ${idx+1}/20</div>
      <div class="qtitle">${q.t}</div>
      <div class="opts">${["A","B","C","D"].map(k=>`
        <label class="opt">
          <input type="radio" name="q" value="${k}" ${answers[idx]===k?'checked':''}>
          <div class="inner"><div class="k">${k}</div><div class="otxt">${q.o[k]}</div></div>
        </label>`).join('')}
      </div>
    `;
    $("quiz").querySelectorAll('input').forEach(i=>i.onchange=e=>{
      answers[idx]=e.target.value;
      setTimeout(()=>{
        if(idx<19){ idx++; render(); updateProgress(); }
        else { showResult(); }
      },200);
    });
    updateProgress();
    window.scrollTo(0,0);
  }

  function updateProgress(){
    const done = answers.filter(x=>x).length;
    $("fill").style.width = (done/20*100)+'%';
    $("ptext").textContent = `深度画像扫描进度：${Math.round(done/20*100)}%`;
  }

  function showResult(){
    const ov = document.createElement('div'); ov.id='loadingOverlay';
    ov.innerHTML = `<div class="spinner"></div><div class="loadingText" id="ls">正在同步 2026 财年数据...</div>`;
    document.body.appendChild(ov);
    
    const ss = ["正在扫描金钱阴影...","正在计算增长模型...","画像导出中..."];
    let si = 0; const itv = setInterval(()=>{ if(si<ss.length)$("ls").textContent=ss[si++]; },600);

    setTimeout(()=>{
      clearInterval(itv);
      const counts = {A:0,B:0,C:0,D:0}; answers.forEach(a=>counts[a]++);
      const type = Object.entries(counts).sort((a,b)=>b[1]-a[1] || "CDAB".indexOf(a[0])-"CDAB".indexOf(b[0]))[0][0];
      const t = TYPES[type];
      $("resultCard").innerHTML = `
        <div class="resHead"><div class="avatar">${t.emoji}</div>
        <div><div class="rtype">2026 钱味画像</div><div class="rtitle">${t.title}</div><div class="raka">${t.aka}</div></div></div>
        <div class="resBody">${t.body}</div>`;
      $("quizWrap").classList.add("hidden"); $("result").classList.remove("hidden");
      ov.style.opacity='0'; setTimeout(()=>ov.remove(),400); window.scrollTo(0,0);
    },2200);
  }

  $("shotBtn").onclick = () => {
    html2canvas($("resultCard"),{backgroundColor:"#050617",scale:2}).then(cvs=>{
      $("shotImg").src = cvs.toDataURL("image/png");
      $("shotWrap").classList.remove("hidden");
      window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    });
  };
  $("againBtn").onclick = () => location.reload();
</script>
</body>
</html>
