<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 钱味觉醒测试</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  background:#0c0c18;
  color:#fff;
  padding:20px;
}

.container{
  max-width:720px;
  margin:auto;
}

.card{
  background:linear-gradient(145deg,#191933,#121226);
  border-radius:20px;
  padding:22px;
  margin-top:20px;
  box-shadow:0 0 30px rgba(124,58,237,0.2);
}

button{
  padding:10px 16px;
  border-radius:14px;
  border:none;
  margin:6px 4px;
  font-weight:bold;
  cursor:pointer;
}

.primary{
  background:linear-gradient(90deg,#ff3d8d,#7c3aed);
  color:white;
}

.secondary{
  background:#222;
  color:#ddd;
}

.option{
  background:#1e1e33;
  padding:12px;
  border-radius:14px;
  margin:8px 0;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  background:#2a2a4d;
}

.progress{
  height:8px;
  background:#222;
  border-radius:6px;
  overflow:hidden;
  margin-top:12px;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#60a5fa,#ff3d8d);
  width:0%;
  transition:0.3s;
}

@keyframes glowPulse {
  0% { text-shadow: 0 0 5px #ff3d8d; }
  50% { text-shadow: 0 0 20px #7c3aed; }
  100% { text-shadow: 0 0 5px #ff3d8d; }
}

.result-title{
  font-size:28px;
  font-weight:900;
  animation:glowPulse 2s infinite;
}

.power-bar{
  height:10px;
  background:#222;
  border-radius:8px;
  margin-top:10px;
  overflow:hidden;
}

.power-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff3d8d,#7c3aed,#22c55e);
  transition:width 1.5s ease;
}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h2>2026 钱味觉醒测试</h2>
<button class="primary" onclick="startTest()">开始测试</button>
</div>

<div id="quiz" style="display:none;">
<div class="card">
<h3 id="question"></h3>
<div id="options"></div>
<div>
<button class="secondary" onclick="prevQuestion()">上一题</button>
<button class="secondary" onclick="nextQuestion()">下一题</button>
<button class="secondary" onclick="resetTest()">返回最开始</button>
</div>
<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>
</div>

<div id="result" style="display:none;">
<div class="card" id="resultContent"></div>
<button class="primary" onclick="saveImage()">保存为图片</button>
<button class="secondary" onclick="resetTest()">重新测试</button>
</div>

</div>

<script>

const questions = [
{q:"你银行卡余额低于4位数时的反应？",o:["立刻焦虑算钱","还能再搏一把","是不是不够厉害","找人倾诉"]},
{q:"如果突然失业，你第一步？",o:["削减开支","找更大的机会","报课升级","联系所有人"]},
{q:"你更害怕哪种未来？",o:["不稳定","错过风口","被淘汰","单打独斗"]},
{q:"别人暴富你心里一句？",o:["运气而已","我也想赌一把","他有本事","背后有人"]},
{q:"做决定卡在哪？",o:["安不安全","值不值得赌","逻辑对不对","有没有队友"]},
{q:"最容易花钱在哪？",o:["让生活更稳","让自己爽","提升能力","维系关系"]},
{q:"最讨厌被说？",o:["胆小","冲动","只会学习","只会靠人"]},
{q:"机会和安全冲突？",o:["选安全","选机会","研究更久","拉人一起"]},
{q:"更愿意用什么换钱？",o:["时间","运气","技能","人脉"]},
{q:"最不甘心？",o:["本可更稳","本可更赚","本可更强","本可更多资源"]},
{q:"更相信什么？",o:["规则","时机","能力","关系"]},
{q:"最大焦虑？",o:["不够安全","不够成功","不够优秀","不够后台"]},
{q:"收入下降时？",o:["收缩","加码","复盘","求助"]},
{q:"对稳定态度？",o:["必须","无聊","基础","共享"]},
{q:"最羡慕谁？",o:["钱多又稳","一夜翻身","实力碾压","背景强大"]},
{q:"更怕？",o:["亏钱","错过","退步","没人撑"]},
{q:"常安慰自己？",o:["稳一点","下次一定","再准备一下","找人问问"]},
{q:"人生更像？",o:["打地基","抢跑道","升级打怪","组队通关"]},
{q:"钱不是问题优先提升？",o:["安全垫","速度","能力","圈子"]},
{q:"内心最真实渴望？",o:["安心","翻盘","强大","有人撑腰"]}
];

let current=0;
let answers=[];

function startTest(){
 document.getElementById("start").style.display="none";
 document.getElementById("quiz").style.display="block";
 showQuestion();
}

function showQuestion(){
 let q=questions[current];
 document.getElementById("question").innerText=(current+1)+". "+q.q;
 let html="";
 q.o.forEach((opt,i)=>{
  html+=`<div class="option" onclick="selectOption(${i})">${opt}</div>`;
 });
 document.getElementById("options").innerHTML=html;
 updateProgress();
}

function selectOption(i){
 answers[current]=i;
}

function nextQuestion(){
 if(current<questions.length-1){
  current++;
  showQuestion();
 }else{
  showResult();
 }
}

function prevQuestion(){
 if(current>0){
  current--;
  showQuestion();
 }
}

function resetTest(){
 current=0;
 answers=[];
 document.getElementById("result").style.display="none";
 document.getElementById("quiz").style.display="none";
 document.getElementById("start").style.display="block";
}

function updateProgress(){
 let percent=(current/questions.length)*100;
 document.getElementById("progressBar").style.width=percent+"%";
}

function showResult(){
 document.getElementById("quiz").style.display="none";
 document.getElementById("result").style.display="block";
 
 let counts=[0,0,0,0];
 answers.forEach(a=>counts[a]++);
 let maxIndex=counts.indexOf(Math.max(...counts));

 const types=[
  "🅰 人间稳妥小财神",
  "🅱 天生机会捕捉者",
  "🅲 自我增值天花板",
  "🅳 团队粘合剂"
 ];

 const lines=[
  "你不会最快，但你几乎不会退场。",
  "你不缺机会，你缺刹车。",
  "你迟早会贵，只是还没开口。",
  "你不适合躺赢，你适合带人赢。"
 ];

 let power=Math.floor(75+Math.random()*20);

 document.getElementById("resultContent").innerHTML=`
  <div class="result-title">${types[maxIndex]}</div>
  <p>${lines[maxIndex]}</p>

  <div style="margin-top:20px;font-weight:bold;">
    2026 财富战力值：<span id="powerValue">0</span>%
  </div>

  <div class="power-bar">
    <div class="power-fill" id="powerFill"></div>
  </div>
 `;

 setTimeout(()=>{
   document.getElementById("powerFill").style.width=power+"%";
   animateNumber("powerValue",power);
 },300);
}

function animateNumber(id,target){
 let el=document.getElementById(id);
 let current=0;
 let interval=setInterval(()=>{
   current+=2;
   if(current>=target){
     current=target;
     clearInterval(interval);
   }
   el.innerText=current;
 },20);
}

function saveImage(){
 html2canvas(document.getElementById("resultContent")).then(canvas=>{
  let link=document.createElement("a");
  link.download="钱味测试结果.png";
  link.href=canvas.toDataURL();
  link.click();
 });
}

</script>
</body>
</html>
