<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>2026 钱味觉醒测试｜完整版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --bg:#050612;
      --tx:#edf1ff;
      --sub:#a5aecb;
      --bd:rgba(255,255,255,.16);
      --glass:rgba(10,13,30,.86);
      --glass2:rgba(13,18,40,.96);
      --shadow:0 18px 60px rgba(0,0,0,.55);
      --accent:#ff3d8d;
      --accent2:#7c3aed;
      --accent3:#22c55e;
      --max:960px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--tx);
      background:
        radial-gradient(900px 600px at 10% 5%, rgba(255,61,141,.26), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(124,58,237,.28), transparent 60%),
        radial-gradient(900px 600px at 60% 90%, rgba(34,197,94,.22), transparent 60%),
        #020314;
      padding:16px 12px 48px;
    }
    .wrap{max-width:var(--max);margin:0 auto}
    .hidden{display:none !important}

    .hero,.card{
      border:1px solid var(--bd);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .hero{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(11,16,40,.95));
      margin-bottom:14px;
    }
    .card{
      background:linear-gradient(180deg, var(--glass2), var(--glass));
      margin-top:12px;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .space{justify-content:space-between}
    h1{margin:0 0 6px;font-size:18px;letter-spacing:.2px}
    .sub{margin:0;color:var(--sub);font-size:13px;line-height:1.7}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 12px;border-radius:999px;
      border:1px solid var(--bd);
      background:rgba(255,255,255,.04);
      font-size:12px;color:var(--sub);
    }

    input{
      width:min(420px,100%);
      border:1px solid rgba(255,255,255,.2);
      background:rgba(6,9,26,.9);
      color:var(--tx);
      border-radius:16px;
      padding:11px 12px;
      font-size:14px;
      outline:none;
    }
    input::placeholder{color:#8f9abd}

    button{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--tx);
      border-radius:16px;
      padding:9px 13px;
      font-weight:700;
      cursor:pointer;
      font-size:13px;
    }
    button.primary{
      border-color:transparent;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
    }
    button:disabled{opacity:.5;cursor:not-allowed}

    .progressWrap{margin-top:10px}
    .bar{
      height:10px;border-radius:999px;background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);overflow:hidden;
    }
    .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent3),#60a5fa,var(--accent))}
    .ptext{margin-top:8px;color:var(--sub);font-size:12px}

    .mini{color:var(--sub);font-size:12px;line-height:1.6}
    .divider{height:1px;background:rgba(255,255,255,.12);margin:12px 0}
    .navRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

    /* 问题 */
    .qindex{color:#f9fafb;font-size:12px;font-weight:700;margin-bottom:4px;opacity:.9}
    .qtitle{margin:0 0 10px;font-size:15px;font-weight:900;line-height:1.5}
    .opts{display:grid;gap:10px}
    label.opt{
      display:block;cursor:pointer;
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(34,40,80,.95), rgba(12,15,40,.96));
      border-radius:18px;
      padding:10px;
      transition:transform .08s ease,border-color .12s ease,box-shadow .12s ease;
    }
    label.opt:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.3);
      box-shadow:0 10px 25px rgba(0,0,0,.45);
    }
    .inner{display:flex;gap:10px;align-items:flex-start}
    .k{
      display:inline-flex;align-items:center;justify-content:center;
      width:28px;height:28px;border-radius:11px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.2);
      font-weight:900;flex:0 0 auto;
    }
    .otxt{line-height:1.5;font-size:14px}
    input[type="radio"]{display:none}
    input[type="radio"]:checked + .inner{
      outline:2px solid rgba(255,61,141,.7);
      border-radius:12px;padding:6px;
    }

    /* 结果卡 */
    .resultCard{
      padding:16px;border-radius:22px;
      background:
        linear-gradient(135deg, rgba(255,61,141,.15), rgba(124,58,237,.18)),
        #050617;
      border:1px solid rgba(255,255,255,.18);
    }
    .resHead{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .avatar{
      width:90px;height:110px;border-radius:18px;
      background:#020617;
      padding:6px;
      box-shadow:0 16px 45px rgba(0,0,0,.7);
      flex-shrink:0;
      position:relative;
      overflow:hidden;
    }
    .cardFrame{
      width:100%;height:100%;border-radius:14px;
      padding:6px;
      background:linear-gradient(135deg,rgba(255,255,255,.3),rgba(15,23,42,1));
      position:relative;
    }
    .cardInner{
      width:100%;height:100%;
      border-radius:10px;
      background:radial-gradient(circle at 10% 0%,rgba(255,255,255,.5),transparent 55%),
                  radial-gradient(circle at 90% 100%,rgba(15,23,42,.9),#020617);
      position:relative;
      overflow:hidden;
    }
    .cardLabel{
      position:absolute;top:6px;left:6px;
      padding:3px 7px;border-radius:999px;
      font-size:9px;font-weight:700;
      background:rgba(15,23,42,.78);
      color:#e5e7eb;
      border:1px solid rgba(148,163,184,.7);
    }
    .bigLetter{
      position:absolute;top:6px;right:8px;
      font-size:24px;font-weight:900;
      color:rgba(15,23,42,.35);
    }
    .faceWrap{
      position:absolute;left:50%;top:46%;
      transform:translate(-50%,-50%);
      width:58%;height:58%;
      border-radius:999px;
      background:#ffe7d6;
      box-shadow:0 4px 10px rgba(0,0,0,.35);
    }
    .eye{
      position:absolute;top:38%;width:12px;height:18px;
      border-radius:999px;
      background:#111827;
      box-shadow:0 0 0 2px rgba(0,0,0,.3);
    }
    .eye.left{left:28%}
    .eye.right{right:28%}
    .eye::after{
      content:"";
      position:absolute;top:3px;left:3px;
      width:5px;height:5px;border-radius:999px;
      background:rgba(255,255,255,.95);
    }
    .mouth{
      position:absolute;left:50%;top:66%;
      width:24px;height:13px;
      border-radius:0 0 999px 999px;
      border-bottom:3px solid #9f1239;
      transform:translateX(-50%);
    }
    .blush{
      position:absolute;top:56%;width:16px;height:8px;
      border-radius:999px;
      background:rgba(248,113,113,.55);
      filter:blur(1px);
    }
    .blush.left{left:18%}
    .blush.right{right:18%}
    .hairBand{
      position:absolute;left:50%;top:8%;
      transform:translateX(-50%);
      width:82%;height:52%;
      border-radius:52px;
    }
    .avatar-A .hairBand{background:linear-gradient(135deg,#f97316,#facc15);}
    .avatar-B .hairBand{background:linear-gradient(135deg,#22c55e,#14b8a6);}
    .avatar-C .hairBand{background:linear-gradient(135deg,#38bdf8,#6366f1);}
    .avatar-D .hairBand{background:linear-gradient(135deg,#f472b6,#fb7185);}

    .prop{position:absolute;opacity:.88}
    .prop-coin{
      width:18px;height:18px;border-radius:999px;
      background:radial-gradient(circle at 30% 20%,#fefce8,#facc15);
      border:2px solid #eab308;
      right:8px;bottom:10px;
      box-shadow:0 0 10px rgba(234,179,8,.6);
    }
    .prop-rocket{right:6px;bottom:8px;width:22px;height:32px;}
    .rocket-body{
      width:14px;height:22px;border-radius:999px;
      background:linear-gradient(135deg,#e5e7eb,#60a5fa);
      margin:0 auto;position:relative;
    }
    .rocket-body::before{
      content:"";
      position:absolute;top:-9px;left:50%;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:7px solid transparent;
      border-right:7px solid transparent;
      border-bottom:9px solid #60a5fa;
    }
    .rocket-fire{
      width:10px;height:12px;
      background:radial-gradient(circle at 50% 0%,#f97316,#be123c);
      border-radius:999px;
      margin:0 auto;margin-top:1px;
    }
    .prop-book{
      left:8px;bottom:9px;width:26px;height:18px;
      background:linear-gradient(135deg,#e5e7eb,#bfdbfe);
      border-radius:3px;
      box-shadow:0 0 8px rgba(59,130,246,.5);
      position:absolute;
    }
    .prop-book::before{
      content:"";position:absolute;left:3px;top:4px;
      width:20px;height:2px;border-radius:999px;
      background:#93c5fd;
      box-shadow:0 5px 0 #bfdbfe;
    }
    .prop-bubble{
      right:10px;bottom:12px;width:26px;height:18px;
      border-radius:9px;
      background:radial-gradient(circle at 30% 20%,#eef2ff,#c7d2fe);
      box-shadow:0 0 10px rgba(129,140,248,.6);
      position:absolute;
    }
    .prop-bubble::after{
      content:"";position:absolute;left:6px;top:5px;
      width:12px;height:2px;border-radius:999px;
      background:#818cf8;
      box-shadow:0 5px 0 #a5b4fc;
    }

    .rtype{font-size:13px;opacity:.85;margin-bottom:2px}
    .rtitle{font-size:18px;font-weight:900}
    .raka{font-size:12px;color:var(--sub)}
    .resBody{margin-top:12px;font-size:13px;line-height:1.85;white-space:pre-wrap}
    .shotImg{width:100%;border-radius:18px;margin-top:10px;border:1px solid rgba(148,163,184,.5)}
    .shotNote{font-size:12px;color:var(--sub);margin-top:4px}

    /* 深度计算遮罩 */
    #loadingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 6, 18, 0.9); backdrop-filter: blur(15px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.4s;
    }
    .spinner {
      width: 50px; height: 50px; border: 3px solid rgba(255, 61, 141, 0.2);
      border-top: 3px solid var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loadingText { font-size: 14px; color: var(--sub); letter-spacing: 1px; text-align:center; }

    /* 小屏更友好 */
    @media (max-width: 500px) {
      .avatar { width: 80px; height: 100px; }
      .faceWrap { width: 55%; height: 55%; }
      .hairBand { height: 48%; }
      .prop { transform: scale(0.85); transform-origin: bottom right; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <!-- 口令页 -->
  <section class="hero" id="gate">
    <div class="row space">
      <div>
        <h1>2026 钱味觉醒测试｜完整版</h1>
        <p class="sub">
          20 道题，帮你看清：你到底是哪一种搞钱体质。<br>
          不是算命，是把你脑子里那套钱观，翻译成一句人话。
        </p>
      </div>
      <div class="pill">20题｜约2分钟｜建议截图结果卡</div>
    </div>

    <div class="row" style="margin-top:12px">
      <input id="code" placeholder="输入神秘口令（下单后自动回复里）" />
      <button class="primary" id="unlock">开始测试</button>
      <button id="helpBtn">打不开？</button>
    </div>

    <div class="progressWrap">
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="ptext" id="ptext">进度：0 / 20</div>
    </div>

    <p class="mini hidden" id="helpText" style="margin-top:8px">
      如果页面进不去 / 一直白屏：<br>
      1）先刷新一次页面<br>
      2）换 Safari / Chrome 再试<br>
      3）还不行：回小红书留言【打不开】，我会补发入口或新口令。
    </p>

    <p class="mini" style="margin-top:6px">
      提示：口令错了会直接拦截；测试结果只保存在你自己设备里，建议测完立刻截图。
    </p>
  </section>

  <!-- 题目页 -->
  <section class="card hidden" id="quiz"></section>

  <!-- 结果页 -->
  <section class="card hidden" id="result">
    <div class="resultCard" id="resultCard"></div>

    <div class="divider"></div>

    <div class="row navRow">
      <button class="primary" id="shotBtn">生成截图卡片</button>
      <button id="againBtn">返回最开始重新测</button>
    </div>

    <!-- 2) 分享话术按钮（提升二次传播） -->
    <div class="row navRow">
      <button id="shareTextBtn" class="primary">一键生成分享文案</button>
    </div>

    <p class="shotNote">
      生成后，往下滑，长按图片即可保存 / 发小红书 / 朋友圈。<br>
      分享文案会尝试自动复制到剪贴板（不支持时会弹出文本供你复制）。
    </p>
  </section>

  <!-- 截图预览 -->
  <section class="card hidden" id="shotWrap">
    <p class="mini">↓ 已为你生成结果截图卡片</p>
    <img id="shotImg" class="shotImg" alt="测试结果截图" />
  </section>

</div>

<script>
  // ====== 配置区 ======

  // QUESTIONS（你这版升级）
  const QUESTIONS = [

  // DOM helpers
  const $ = id => document.getElementById(id);
  const gate = $("gate");
  const quiz = $("quiz");
  const result = $("result");
  const shotWrap = $("shotWrap");
  const fill = $("fill");
  const ptext = $("ptext");

  let idx = 0;
  const answers = Array(QUESTIONS.length).fill(null);

  // 1) 更安全的 CSS.escape 兜底（避免 selector 因特殊字符报错）
  function cssEscape(s){
    if(window.CSS && typeof CSS.escape === "function") return CSS.escape(String(s));
    return String(s).replace(/["\\]/g, "\\$&");
  }

  function showOnly(which){
    gate.classList.add("hidden");
    quiz.classList.add("hidden");
    result.classList.add("hidden");
    if(which==="gate") gate.classList.remove("hidden");
    if(which==="quiz") quiz.classList.remove("hidden");
    if(which==="result") result.classList.remove("hidden");
  }

  function updateProgress(){
    const done = answers.filter(x=>x!==null).length;
    ptext.textContent = "进度：" + done + " / " + QUESTIONS.length;
    fill.style.width = String(Math.round(done/QUESTIONS.length*100)) + "%";
  }

  // 3) 每题选项点击音效（WebAudio，无需外部文件）
  let audioCtx = null;
  function playTick(){
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const t = audioCtx.currentTime;

      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();

      o.type = "triangle";
      o.frequency.setValueAtTime(880, t);
      o.frequency.exponentialRampToValueAtTime(520, t + 0.06);

      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.18, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);

      o.connect(g);
      g.connect(audioCtx.destination);

      o.start(t);
      o.stop(t + 0.10);
    }catch(e){
      // 静默失败（某些环境禁音）
    }
  }

  function renderQuestion(){
    const q = QUESTIONS[idx];
    const letters = ["A","B","C","D"];

    quiz.innerHTML = `
      <div>
        <div class="qindex">第 ${idx+1} 题 / ${QUESTIONS.length}</div>
        <p class="qtitle">${q.t}</p>
        <div class="opts">
          ${letters.map(k=>`
            <label class="opt">
              <input type="radio" name="q${idx}" value="${k}">
              <div class="inner">
                <div class="k">${k}</div>
                <div class="otxt">${q.o[k]}</div>
              </div>
            </label>
          `).join("")}
        </div>
        <div class="navRow">
          <button id="prevBtn">上一题</button>
          <button id="nextBtn">下一题</button>
          <button id="backBtn">返回最开始</button>
        </div>
        <p class="mini" style="margin-top:6px">提示：点选选项会自动跳到下一题，想回头改可以用「上一题」。</p>
      </div>
    `;

    // 1) 安全写法：不用模板字符串 selector
    if(answers[idx]){
      const v = answers[idx];
      const sel = 'input[value="' + cssEscape(v) + '"]';
      const input = quiz.querySelector(sel);
      if(input) input.checked = true;
    }

    // 1) 安全写法：不用模板字符串 selector
    const groupName = "q" + idx;
    const radios = quiz.querySelectorAll('input[name="' + cssEscape(groupName) + '"]');

    // 选项监听：音效 + 自动下一题 / 出结果
    radios.forEach(r=>{
      r.addEventListener("change", e=>{
        playTick();

        const v = e.target.value;
        answers[idx] = v;
        updateProgress();

        if(idx === QUESTIONS.length - 1){
          showResult();
        }else{
          idx++;
          renderQuestion();
          window.scrollTo({top:0,behavior:"instant"});
        }
      });
    });

    $("prevBtn").onclick = () => {
      if(idx>0){
        idx--;
        renderQuestion();
        window.scrollTo({top:0,behavior:"instant"});
      }
    };

    $("nextBtn").onclick = () => {
      if(!answers[idx]){
        alert("这一题还没选哦，先选一个再进入下一题。");
        return;
      }
      if(idx < QUESTIONS.length - 1){
        idx++;
        renderQuestion();
        window.scrollTo({top:0,behavior:"instant"});
      }else{
        if(answers.every(x=>x!==null)) showResult();
        else alert("还有题没选完哦。");
      }
    };

    $("backBtn").onclick = resetAll;
  }

  function computeType(){
    const score = {A:0,B:0,C:0,D:0};
    answers.forEach(a=>{ if(a) score[a]++; });
    const priority = {C:4,D:3,A:2,B:1};
    const sorted = Object.entries(score).sort((x,y)=>{
      if(y[1]!==x[1]) return y[1]-x[1];
      return priority[y[0]] - priority[x[0]];
    });
    return sorted[0][0];
  }

  function avatarHTML(type){
    const t = TYPES[type];
    const props = {
      A:'<div class="prop prop-coin"></div>',
      B:'<div class="prop prop-rocket"><div class="rocket-body"></div><div class="rocket-fire"></div></div>',
      C:'<div class="prop prop-book"></div>',
      D:'<div class="prop prop-bubble"></div>'
    }[type] || "";
    return `
      <div class="avatar avatar-${type}">
        <div class="cardFrame">
          <div class="cardInner">
            <div class="cardLabel">${t.badge}</div>
            <div class="bigLetter">${t.tag}</div>
            <div class="hairBand"></div>
            <div class="faceWrap">
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="blush left"></div>
              <div class="blush right"></div>
              <div class="mouth"></div>
            </div>
            ${props}
          </div>
        </div>
      </div>
    `;
  }

  function showResult() {
    const overlay = document.createElement('div');
    overlay.id = 'loadingOverlay';
    overlay.innerHTML = `
      <div class="spinner"></div>
      <div class="loadingText" id="loadStatus">正在量子纠缠你的财富时间线...</div>
    `;
    document.body.appendChild(overlay);

    // loading 文案（赛博）
    const statuses = [
      "正在量子纠缠你的财富时间线...",
      "正在从链上解码你的金钱DNA...",
      "正在和2026年的你远程对线...",
      "画像生成完成，正在签发赛博人格卡..."
    ];
    let sIdx = 0;
    const statusInterval = setInterval(() => {
      if(sIdx < statuses.length) {
        const el = document.getElementById('loadStatus');
        if(el) el.textContent = statuses[sIdx];
        sIdx++;
      }
    }, 600);

    setTimeout(() => {
      clearInterval(statusInterval);

      const type = computeType();
      const t = TYPES[type];

      $("resultCard").innerHTML = `
        <div class="resHead">
          ${avatarHTML(type)}
          <div class="rMain">
            <div class="rtype">你的搞钱体质类型</div>
            <div class="rtitle">${t.title}</div>
            <div class="raka">${t.aka}</div>
          </div>
        </div>
        <div class="resBody">${t.body.replace(/\n/g,"<br>")}</div>
      `;

      showOnly("result");
      shotWrap.classList.add("hidden");

      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 400);
      window.scrollTo({top: 0, behavior: "smooth"});
    }, 2500);
  }

  function resetAll(){
    idx = 0;
    for(let i=0;i<answers.length;i++) answers[i]=null;
    updateProgress();
    $("code").value = "";
    showOnly("gate");
    shotWrap.classList.add("hidden");
    window.scrollTo({top:0,behavior:"instant"});
  }

  function generateShot(){
    const node = $("resultCard");
    html2canvas(node,{backgroundColor:null}).then(canvas=>{
      const img = $("shotImg");
      img.src = canvas.toDataURL("image/png");
      shotWrap.classList.remove("hidden");
      window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
    }).catch(()=>alert("截图失败，可以稍后重试一次。"));
  }

  // 2) 一键生成分享文案（复制剪贴板 + fallback）
  function buildShareText(){
    const type = computeType();
    const t = TYPES[type];

    // 取“互联网版一句话”段落：用最后一个 ⸻ 后面那段兜底
    const parts = t.body.split("⸻");
    const punch = (parts[parts.length - 1] || "").trim()
      || "你不会最快暴富，但你大概率活到最后";

    const shareText =
`刚测了《2026钱味觉醒测试》，结果把我扎心了…
我是：${t.title} ${t.aka}

一句话总结：
${punch}

你们是什么体质？快去测！
口令：${TODAY_CODE}`;

    return shareText;
  }

  async function copyShareText(){
    const shareText = buildShareText();

    // 先尝试复制
    let copied = false;
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(shareText);
        copied = true;
      }
    }catch(e){}

    if(copied){
      alert("已复制到剪贴板！直接粘贴发朋友圈/小红书～\n\n" + shareText);
      return;
    }

    // fallback：用 prompt 让用户长按复制（iOS 很稳）
    window.prompt("复制这段分享文案（长按全选复制）：", shareText);
  }

  // 事件绑定
  $("unlock").onclick = () => {
    const v = ($("code").value || "").trim();
    if(v !== TODAY_CODE){
      alert("口令不对。请回小红书订单自动回复里确认一下。");
      return;
    }
    idx = 0;
    for(let i=0;i<answers.length;i++) answers[i]=null;
    updateProgress();
    showOnly("quiz");
    renderQuestion();
    window.scrollTo({top:0,behavior:"instant"});
  };

  $("helpBtn").onclick = () => {
    $("helpText").classList.toggle("hidden");
  };

  $("shotBtn").onclick = generateShot;
  $("againBtn").onclick = resetAll;

  // 分享按钮
  $("shareTextBtn").onclick = () => {
    copyShareText();
  };

  updateProgress();
</script>
